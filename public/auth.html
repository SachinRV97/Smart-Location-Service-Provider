<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authentication | Smart Location Service Provider</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero compact">
    <h1>Authentication</h1>
    <p>Create account, sign in, and manage session.</p>
  </header>

  <nav class="top-nav">
    <a class="nav-link" href="/index.html">Home</a>
    <a class="nav-link is-active" href="/auth.html">Authentication</a>
    <a class="nav-link" href="/stores.html">Store Discovery</a>
    <a class="nav-link" href="/owner.html">Owner Portal</a>
    <a class="nav-link" href="/admin.html">Admin Portal</a>
  </nav>

  <main class="layout single-column">
    <section class="card">
      <h2>Account flow</h2>
      <div class="tabs">
        <button class="tab is-active" data-panel="register-panel">Register</button>
        <button class="tab" data-panel="login-panel">Login</button>
      </div>

      <form id="register-panel" class="panel">
        <label>Name <input name="name" required /></label>
        <label>Email <input name="email" type="email" required /></label>
        <label>Password <input name="password" type="password" minlength="6" required /></label>
        <label>Phone <input name="phone" /></label>
        <label>Role
          <select name="role">
            <option value="customer">Customer</option>
            <option value="owner">Owner</option>
          </select>
        </label>
        <button type="submit">Create account</button>
      </form>

      <form id="login-panel" class="panel hidden">
        <label>Email <input name="email" type="email" required /></label>
        <label>Password <input name="password" type="password" required /></label>
        <button type="submit">Sign in</button>
      </form>

      <div class="session-box">
        <p><strong>Current user:</strong> <span id="user-display">None</span></p>
        <div class="button-row">
          <button id="refresh-notifications-btn" type="button" class="secondary">Refresh Notifications</button>
          <button id="mark-all-read-btn" type="button" class="secondary">Mark All Read</button>
          <button id="logout-btn" type="button" class="secondary">Logout</button>
        </div>
      </div>

      <h3>Notifications</h3>
      <ul id="notification-list" class="list"></ul>
    </section>
  </main>

  <section id="toast" class="toast" aria-live="polite"></section>
  <script src="/app.js"></script>
</body>
</html>
