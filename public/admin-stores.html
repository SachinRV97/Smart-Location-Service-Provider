<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Stores | Smart Location Service Provider</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero compact">
    <h1>Store Moderation</h1>
    <p>Approve, reject, block, and unblock store listings.</p>
  </header>

  <nav class="top-nav">
    <a class="nav-link" href="/admin.html">Admin Portal</a>
    <a class="nav-link" href="/admin-dashboard.html">Dashboard</a>
    <a class="nav-link is-active" href="/admin-stores.html">Stores</a>
    <a class="nav-link" href="/admin-users.html">Users</a>
    <a class="nav-link" href="/admin-reviews.html">Reviews</a>
    <a class="nav-link" href="/admin-metadata.html">Metadata</a>
  </nav>

  <main class="layout single-column">
    <section class="card">
      <div class="session-box">
        <p><strong>Current user:</strong> <span id="user-display">None</span></p>
        <div class="button-row">
          <button id="pending-btn" type="button">Refresh Pending Stores</button>
          <button id="all-stores-btn" type="button" class="secondary">Refresh All Stores</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h3>Pending Stores</h3>
      <ul id="pending-list" class="list"></ul>
    </section>

    <section class="card">
      <h3>All Stores</h3>
      <ul id="all-stores-list" class="list"></ul>
    </section>
  </main>

  <section id="toast" class="toast" aria-live="polite"></section>
  <script src="/app.js"></script>
</body>
</html>
