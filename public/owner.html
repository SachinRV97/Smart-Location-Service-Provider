<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Portal | Smart Location Service Provider</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero compact">
    <h1>Owner Portal</h1>
    <p>Submit your store for admin review.</p>
  </header>

  <nav class="top-nav">
    <a class="nav-link" href="/index.html">Home</a>
    <a class="nav-link" href="/auth.html">Authentication</a>
    <a class="nav-link" href="/stores.html">Store Discovery</a>
    <a class="nav-link is-active" href="/owner.html">Owner Portal</a>
    <a class="nav-link" href="/admin.html">Admin Portal</a>
  </nav>

  <main class="layout single-column">
    <section class="card">
      <h2>Submit store</h2>
      <p class="hint">Requires <code>owner</code> or <code>admin</code> login.</p>
      <div class="session-box">
        <p><strong>Current user:</strong> <span id="user-display">None</span></p>
      </div>
      <form id="store-form" class="grid-form">
        <label>Store name <input name="storeName" required /></label>
        <label>Category <input name="category" required /></label>
        <label>State <input name="state" required /></label>
        <label>City <input name="city" required /></label>
        <label>Address <input name="address" /></label>
        <label>Opening (HH:MM) <input name="openingTime" placeholder="09:00" /></label>
        <label>Closing (HH:MM) <input name="closingTime" placeholder="18:00" /></label>
        <button type="submit">Submit for approval</button>
      </form>
    </section>
  </main>

  <section id="toast" class="toast" aria-live="polite"></section>
  <script src="/app.js"></script>
</body>
</html>
